services:
  db:
    image: postgres:16-alpine
    container_name: abc
    environment:
      POSTGRES_DB: bibliotecario
      POSTGRES_USER: bibliotecario
      POSTGRES_PASSWORD: bibliotecario
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bibliotecario -d bibliotecario"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    env_file: .env
    container_name: abcd
    environment:
      ASSETS_DIR: /app/assets/images
      DATABASE_URL: postgres://bibliotecario:bibliotecario@db:5432/bibliotecario
    ports:
      - "3050:3050"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
